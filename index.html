<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do</title>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
  <div class="container">

    <!-- Painel Esquerdo - Todo -->
    <div class="left-panel">
      <form action="#" class="todo-form">
        <h1 class="title">ToDo</h1>
        
        <input type="text" data-form-input class="input" placeholder="Digite uma nova tarefa">
        <button data-form-button class="btn">Novo Item</button>
      </form>

      <ul data-ul class="list">
        <li></li>
      </ul>

    </div>
    

    <!-- Painel Direito - Informativo -->
    <div class="right-panel">
      <h2 class="info-title">Lista de Tarefas</h2>
      <p class="info-text">Organize suas tarefas diárias com eficiência! Use este gerenciador de tarefas para anotar e controlar tudo o que você precisa fazer.</p>
    </div>

  </div>

  <script src="main.js"></script>
</body>

</html>
